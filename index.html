<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto do Veículo</title>

    <link rel="stylesheet" href="css/style_veiculo.css">

    <script type="module" src="js/script_veiculo.js" defer ></script>
    
</head>
<body>
    <div id="geral">
    <h3>Cadastro Veículo</h3> 

    <div id="div-form-veiculo">
    <form id="form-veiculo">

    <label for="modelo">Modelo:</label> 
    <input type="text" name="modelo" id="modelo"> <br>

   <label for="marca">Marca:</label> 
   <input type="text" name="marca" id="marca"> <br>

   <label for="placa">Placa:</label>
   <input type="text" name="placa" id="placa"> <br>

   <label for="ano de fabricação">Ano de fabricação:</label>
   <input type="text" name="ano de fabricação" id="ano de fabricação"> <br>

   <label for="valor de mercado">Valor de Mercado:</label>
   <input type="text" name="valor de mercado"
    id="valor de mercado"> <br>

    
     <h1>Tipo de Combustível</h1>

     <div class="combustivel">

        <label>
            <input type="radio" name="combustivel" value="gasolina">
            Gasolina
        </label>
    
        <label>
            <input type="radio" name="combustivel" value="etanol">
            Etanol
        </label>
    
        <label>
            <input type="radio" name="combustivel" value="bicombustivel">
            Bicombustível
        </label>
    
        <label>
            <input type="radio" name="combustivel" value="hibrido">
            Híbrido
        </label>
    
        <label>
            <input type="radio" name="combustivel" value="eletrico">
            Elétrico
        </label>
    
    </div>

    <button type="submit" id="btn-cadastrar">Cadastrar</button>
    <button type="reset" id="btn-limpar">Limpar</button>

    </form>

<h2>LISTA:</h2>
    <div id="lista-veiculo"></div>


</div>

    </div>
</body>
</html>
